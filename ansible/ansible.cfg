# ============================================================
# Cyber Sentinel — Ansible Configuration
# ============================================================
# Purpose:    Top-level Ansible configuration consumed automatically
#             when ansible-playbook is run from this directory or any
#             subdirectory. Defines the inventory location, SSH host
#             key behavior, Python interpreter selection, and the
#             default Ansible Vault password file.
#
# Loaded by:  ansible-playbook (and all ansible-* commands) when run
#             from a directory where this file is reachable. Ansible
#             searches for ansible.cfg in this order:
#               1. ANSIBLE_CONFIG environment variable
#               2. ./ansible.cfg in current working directory
#               3. ~/.ansible.cfg
#               4. /etc/ansible/ansible.cfg
#
# KNOWN ISSUES (deferred — do not silently fix during this pass):
#   * vault_password_file uses an absolute path tied to the original
#     author's machine layout. Anyone cloning this repo to a different
#     path must edit this file or override via --vault-password-file
#     on the command line. A relative path (e.g. ".vault_pass") would
#     make the repo portable.
# ============================================================

[defaults]

# Inventory file location (relative to this ansible.cfg).
# Defines all target hosts and their grouping — see hosts.ini.
inventory = hosts.ini

# Disables interactive prompt to verify SSH host keys on first connect.
# Trade-off: convenient for ephemeral lab VMs that get rebuilt often,
# but reduces protection against MITM attacks. Acceptable for a
# private home-lab; review before deploying to untrusted networks.
host_key_checking = False

# Lets Ansible auto-detect the Python interpreter on each target
# without printing a deprecation warning. Avoids hard-coding
# /usr/bin/python3, which differs between Debian/Ubuntu versions.
interpreter_python = auto_silent

# Path to the file containing the Ansible Vault password used to
# decrypt group_vars/all/vault.yml at runtime.
# KNOWN ISSUE: absolute path — see file header.
vault_password_file = /home/hunter/IdeaProjects/cyber-sentinel/ansible/.vault_pass