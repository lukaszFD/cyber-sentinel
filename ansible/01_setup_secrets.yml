---
# ============================================================
# Cyber Sentinel — Playbook 01 — Secret & Environment Management
# ============================================================
# Purpose:    Generates the .env file on the remote host from a Jinja2
#             template, populated with secrets decrypted from the local
#             ansible-vault group_vars. This .env is consumed by docker
#             compose in playbook 04.2.
#
# Depends on: - templates/env.j2 must exist locally
#             - group_vars/all/vault.yml must contain all secret values
#               referenced by env.j2
#             - .vault_pass file (or --ask-vault-pass) for decryption
#
# Outputs:    {{ remote_deploy_base }}/.env — owned by deployment_user,
#             permissions 0600 (secrets must not be world-readable).
#
# Errors:     - Permission denied: deployment_user does not own
#               remote_deploy_base or sudo is misconfigured.
#             - Undefined variable: secret missing in group_vars/all/vault.yml
#               (check env.j2 for {{ vault_* }} references).
# ============================================================

- name: 01 - Secret & Environment Management
  hosts: all_servers
  become: yes
  become_method: sudo

  vars:
    remote_env_file: "{{ remote_deploy_base }}/.env"

  tasks:
    # ============================================================
    # SECTION 1 — Deployment directory & .env generation
    # ------------------------------------------------------------
    # Ensures the base directory exists with correct ownership before
    # rendering the .env template. Without this, the template task
    # would fail on first run with "destination does not exist".
    # ============================================================

    - name: "[01.1.1] Create base deployment directory if it doesn't exist"
      ansible.builtin.file:
        path: "{{ remote_deploy_base }}"
        state: directory
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0755'

    # Renders env.j2 with all {{ vault_* }} references substituted.
    # Mode 0600 is mandatory — this file contains all stack passwords
    # and API tokens used by docker compose at container startup.
    - name: "[01.1.2] Generate .env from template with decrypted secrets"
      ansible.builtin.template:
        src: "templates/env.j2"
        dest: "{{ remote_env_file }}"
        owner: "{{ deployment_user }}"
        group: "{{ deployment_user }}"
        mode: '0600'