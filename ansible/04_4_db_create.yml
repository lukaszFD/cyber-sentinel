---
- name: 04.3 - DB create
  hosts: all_servers
  become: yes

  vars:
    vault_url: "http://{{ ansible_host }}:8200"
    source_mysql_script: "{{ main_repo_source_dir }}/config/mysql/db_deployment.sql"
    mysql_init_log: "{{ remote_deploy_base }}/mysql_init.log"

  tasks:
    - name: Task 4.1 - Get Database Credentials from HashiCorp Vault
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_url }}"
        token: "{{ vault_root_token }}"
        path: "cyber-sentinel/credentials"
      register: vault_db_secrets
      no_log: true

    - name: Task 4.2 - Set facts from Vault secrets
      ansible.builtin.set_fact:
        mysql_app_user: "{{ vault_db_secrets.secret.mysql_app_user }}"
        mysql_password: "{{ vault_db_secrets.secret.mysql_password }}"
        mysql_root_password: "{{ vault_db_secrets.secret.mysql_root_password }}"
      no_log: true

    - name: Task 4.3 - Render SQL script with actual credentials
      ansible.builtin.template:
        src: "{{ source_mysql_script }}"
        dest: "{{ remote_deploy_base }}/init_db_rendered.sql"
        owner: "{{ deployment_user }}"
        mode: '0600'

    - name: Task 4.4 - Execute SQL and log output
      ansible.builtin.shell:
        cmd: |
          echo "--- Execution Date: $(date) ---" >> {{ mysql_init_log }}
          docker exec -i mysql_db mysql -u root -p'{{ mysql_root_password }}' < {{ remote_deploy_base }}/init_db_rendered.sql >> {{ mysql_init_log }} 2>&1
      register: db_init_result
      until: (db_init_result.rc | default(-1)) == 0 or (db_init_result.stderr | default('') is search('ERROR 1007'))
      retries: 10
      delay: 10

    - name: Task 4.5 - Cleanup rendered SQL script
      ansible.builtin.file:
        path: "{{ remote_deploy_base }}/init_db_rendered.sql"
        state: absent