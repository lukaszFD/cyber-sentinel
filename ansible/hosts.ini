# ============================================================
# Cyber Sentinel — Ansible Inventory
# ============================================================
# Purpose:    Defines the target hosts for Ansible playbook execution
#             and groups them by environment (production, dev, local).
#             Consumed by ansible.cfg via the `inventory` directive.
#
# Conventions:
#   - Production runs on Raspberry Pi 5 (rpi5-prod group).
#   - Dev runs on a Proxmox VM (vm-prox-dev group). Used for testing
#     changes before promoting to RPi.
#   - Local runs on a port-forwarded VM on the controller host
#     (local-vm group). Used for quick iterations without affecting
#     the dev environment.
#   - The `all_servers` parent group is referenced by every playbook
#     via `hosts: all_servers`, so adding a new host to any child
#     group automatically includes it in the deployment.
#
# Usage:
#   - Deploy to RPi only:        ansible-playbook ... --limit rpi5-prod
#   - Deploy to dev VM:          ansible-playbook ... --limit vm-prox-dev
#   - Deploy to local VM:        ansible-playbook ... --limit local-vm
#   - Deploy to everything:      ansible-playbook ... (no --limit)
#
# Note:       The inventory file uses the legacy INI format. The same
#             content can be expressed in YAML (hosts.yml) — kept INI
#             for brevity and to minimize churn.
# ============================================================

# ------------------------------------------------------------
# [HOSTS.PROD] Production environment — Raspberry Pi 5
# ------------------------------------------------------------
# Single RPi 5 running the full Cyber Sentinel stack.
# IP is on the home LAN; SSH on default port 22.
# ------------------------------------------------------------
[rpi5-prod]
rpi5 ansible_host=192.168.0.2 ansible_user=hunter

# ------------------------------------------------------------
# [HOSTS.DEV] Development environment — Proxmox VM
# ------------------------------------------------------------
# Proxmox-hosted Debian VM. Used for staging changes before they
# hit the RPi. Same OS family as production for parity.
# ------------------------------------------------------------
[vm-prox-dev]
dev_vm ansible_host=192.168.0.5 ansible_user=hunter

# ------------------------------------------------------------
# [HOSTS.LOCAL] Local development VM (SSH port-forwarded)
# ------------------------------------------------------------
# A VM running on the same machine as the Ansible controller,
# reachable via 127.0.0.1:2222 (SSH forwarded from the VM). Useful
# for fast iteration when dev_vm is unavailable or shared.
# Custom port 2222 avoids collision with the host's own SSHd on 22.
# ------------------------------------------------------------
[local-vm]
local_vm ansible_host=127.0.0.1 ansible_port=2222 ansible_user=hunter

# ------------------------------------------------------------
# [HOSTS.PARENT] Aggregate group used by all playbooks
# ------------------------------------------------------------
# Every playbook targets `hosts: all_servers`. The :children
# syntax merges the three child groups, so deploying to a single
# environment is done with --limit at runtime, not by editing
# the playbook.
# ------------------------------------------------------------
[all_servers:children]
rpi5-prod
vm-prox-dev
local-vm