site_name: Cyber Sentinel
site_url: https://lukaszfd.github.io/cyber-sentinel/
repo_url: https://github.com/lukaszFD/cyber-sentinel
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: green
      accent: deep purple
    - scheme: default
      primary: blue
      accent: deep orange
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - navigation.footer

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Deployment:
      - Overview: deployment.md
      - "Config Reference": ansible-00-config.md
      - "01 · Secrets & Env": ansible-01-secrets.md
      - "02 · Firewall (UFW)": ansible-02-security.md
      - "03 · System & Docker": ansible-03-system.md
      - "04.1–2 · Stack & Containers": ansible-04-stack.md
      - "04.3 · Database Init": ansible-04-db.md
      - "04.4 · Post-Config": ansible-04-post-config.md
      - "04.5 · AI Suite (Ollama)": ansible-04-ai.md
      - "05 · Nginx & SSL": ansible-05-proxy.md
      - "06 · HashiCorp Vault": ansible-06-vault.md
  - "Docker components": components.md
  - "n8n Workflow": n8n.md
  - "Database Schema": db.md
  - Project Releases: releases.md

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/lukaszfd84/
      name: My LinkedIn Profile
    - icon: fontawesome/solid/globe
      link: https://lukaszfd.github.io/ICYB_PW/
      name: My Cybersecurity Blog
    - icon: fontawesome/brands/github
      link: https://github.com/lukaszFD
      name: My GitHub Projects

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

copyright: Copyright &copy; 2026 Lukasz Dejko