# ============================================================
# Cyber Sentinel — Docker Compose Stack Definition
# ============================================================
# Purpose:    Defines all services that make up the Cyber Sentinel
#             stack: DNS layer (Unbound, Pi-hole, passive DNS),
#             automation (n8n), data stores (MySQL, MongoDB),
#             observability (Grafana, Prometheus, node_exporter),
#             secret management (HashiCorp Vault), and admin UIs
#             (Portainer, Firefox).
#
# Started by: Playbook 04.2 with `docker compose up --build -d`.
#             Project name pinned to "cyber-sentinel" so container
#             names are predictable (referenced as bare names by
#             playbooks 04.3, 04.4, 04.6, and 06).
#
# Network:    All services attach to a single bridge network
#             `internal_network` (10.10.10.0/24) with static IPs.
#             This convention lets playbooks and Nginx use IPs
#             instead of DNS names where convenient.
#
#             IP allocation:
#               .2  unbound          .9  mysqldb
#               .3  passive_dns      .10 portainer
#               .4  pihole (DNS)     .11 grafana
#               .5  firefox          .12 vault
#               .6  dns_log_processor .13 prometheus
#               .7  n8n              .14 node_exporter
#               .8  mongo            .15 vault_unsealer (disabled)
#               .100 nginx-proxy (created by playbook 05)
#
# Env vars:   ${VAR} placeholders are resolved from the .env file
#             at {{ remote_deploy_base }}/.env (created by 01,
#             augmented by 04.1).
#
# KNOWN ISSUES (deferred — do not silently fix during this pass):
#
#   * pihole.volumes use './pihole' and './dnsmasq.d' (no "config/"
#     prefix), but playbook 04.1 creates 'config/dns/dnsmasq.d/'
#     under remote_deploy_base. These paths are inconsistent — one
#     of the two layouts is wrong. Verify by checking where
#     /etc/pihole/gravity.db actually lives on a deployed host.
#
#   * grafana.environment includes `MYSQL_PASSWORD=${MYSQL_PASSWORD}`,
#     but playbook 04.1 [04.1.3.1] only writes GRAFANA_PASSWORD,
#     MONGODB_PASSWORD, and MYSQL_ROOT_PASSWORD to .env. MYSQL_PASSWORD
#     (the application user's password) is never injected. Either it
#     comes from templates/env.j2 (not visible here) or Grafana
#     receives an empty value. Verify before next release.
#
#   * mongo.environment uses ${MONGODB_USERNAME}, but the .env
#     file is not known to define this variable. all_servers.yml
#     defines `mongodb_username` (Ansible-side), but that does not
#     automatically reach docker-compose. Verify env.j2 includes
#     MONGODB_USERNAME or the container falls back to defaults.
#
#   * n8n publishes port 5678 directly to the host (`5678:5678`),
#     bypassing the Nginx HTTPS proxy from playbook 05. UFW does
#     NOT block this port. If this is intentional (debug access),
#     leave it; otherwise n8n is reachable over plain HTTP from LAN.
# ============================================================

services:

  # ------------------------------------------------------------
  # [SVC.DNS.RECURSIVE] Unbound — recursive DNS resolver
  # ------------------------------------------------------------
  # Acts as the upstream resolver for Pi-hole. Doing recursive
  # resolution locally avoids leaking DNS queries to public
  # resolvers (Google, Cloudflare). Pi-hole forwards uncached
  # queries here on port 53 internal.
  # ------------------------------------------------------------
  unbound:
    image: klutchell/unbound:latest
    container_name: unbound
    hostname: unbound
    networks:
      internal_network:
        ipv4_address: 10.10.10.2
    volumes:
      - './config/unbound/unbound.conf:/etc/unbound/unbound.conf'
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.DNS.PASSIVE] passive_dns — sniffer for IoC harvesting
  # ------------------------------------------------------------
  # Custom dnsmasq build that logs every query/response to a file
  # which dns_log_processor then parses and feeds into MySQL. This
  # is the data source for the threat intelligence pipeline — every
  # IoC analyzed by the AI agent originates here.
  #
  # The custom command flags:
  #   -k                 → keep-foreground (Docker-friendly)
  #   --no-resolv        → ignore /etc/resolv.conf
  #   --server=10.10.10.2 → forward to Unbound
  #   --log-queries      → log every DNS query
  #   --log-facility     → write to mounted volume so other
  #                        containers can read it
  # ------------------------------------------------------------
  passive_dns:
    build:
      context: .
      dockerfile: Dockerfile.pdns
    container_name: passive_dns
    hostname: passive_dns
    networks:
      internal_network:
        ipv4_address: 10.10.10.3
    volumes:
      - './config/dns/dnsmasq.d:/etc/dnsmasq.d'
      - './config/dns/var-log:/var/log'
    restart: unless-stopped
    command: ["dnsmasq", "-k", "--no-resolv", "--server=10.10.10.2#53", "--log-queries", "--log-facility=/var/log/dns.log"]

  # ------------------------------------------------------------
  # [SVC.DNS.AD_BLOCK] Pi-hole — DNS-level ad/threat blocking
  # ------------------------------------------------------------
  # Public DNS server (53/tcp + 53/udp on the host). Adlists are
  # populated by playbook 04.4 [04.4.2.3]. Forwards uncached
  # queries to Unbound for recursive resolution.
  # ------------------------------------------------------------
  # KNOWN ISSUE: volume paths './pihole' and './dnsmasq.d' lack
  # the "config/" prefix used elsewhere in the layout — see file
  # header for details.
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    networks:
      internal_network:
        ipv4_address: 10.10.10.4
    environment:
      TZ: "Europe/Warsaw"
    volumes:
      - './pihole:/etc/pihole'
      - './dnsmasq.d:/etc/dnsmasq.d'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    restart: unless-stopped
    depends_on:
      - unbound
      - passive_dns

  # ------------------------------------------------------------
  # [SVC.UI.BROWSER] Firefox — admin browser
  # ------------------------------------------------------------
  # Containerized Firefox accessible over web (LinuxServer.io
  # build). Lets the operator hit internal-only URLs (Portainer,
  # Grafana, Vault UI) without exposing them to the host network.
  # tmpfs:/config makes the browser stateless — no profile lingers.
  # ------------------------------------------------------------
  firefox:
    image: lscr.io/linuxserver/firefox:latest
    container_name: firefox
    hostname: firefox
    tmpfs:
      - /config
    networks:
      internal_network:
        ipv4_address: 10.10.10.5
    dns: 10.10.10.4
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Warsaw
      - FIREFOX_CLI=https://www.linuxserver.io/
    security_opt:
      - seccomp=unconfined
    shm_size: 2gb
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.DNS.PROCESSOR] dns_log_processor — log → MySQL pipeline
  # ------------------------------------------------------------
  # Tails the dnsmasq log file and inserts parsed records into
  # cyber_intelligence.dns_queries. This is the bridge between
  # passive_dns (which writes flat logs) and the schema that the
  # AI agent and Grafana consume. Read-only mount on the log
  # file because this container should never write to it.
  # ------------------------------------------------------------
  dns_log_processor:
    build:
      context: .
      dockerfile: Dockerfile.log_processor
    container_name: dns_log_processor
    depends_on:
      - mysqldb
    networks:
      internal_network:
        ipv4_address: 10.10.10.6
    dns: 10.10.10.4
    volumes:
      - './config/dns/var-log:/var/log/dns:ro'
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.AUTOMATION] n8n — workflow automation engine
  # ------------------------------------------------------------
  # Hosts the AI threat-scoring workflow (described on n8n.io and
  # imported by playbook 04.4 [04.4.4.4]). Connects to MySQL,
  # MongoDB, Vault, and external CTI APIs.
  #
  # The {{ domain_suffix }} placeholders are NOT Docker variables —
  # they are Ansible Jinja2 expressions that get substituted when
  # docker-compose is rendered through Ansible's template module.
  # If you `docker compose up` this file directly without Ansible,
  # n8n will receive literal "{{ domain_suffix }}" strings.
  # ------------------------------------------------------------
  # KNOWN ISSUE: port 5678 is published to host without HTTPS —
  # see file header.
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-server
    networks:
      internal_network:
        ipv4_address: 10.10.10.7
    dns: 10.10.10.4
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    user: "1000:1000"
    environment:
      - N8N_HOST=n8n.{{ domain_suffix }}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=https://n8n.{{ domain_suffix }}/
      - GENERIC_TIMEZONE=Europe/Warsaw
      - N8N_RUNNERS_ENABLED=true
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.DB.MONGO] MongoDB — raw CTI response storage
  # ------------------------------------------------------------
  # Stores the unparsed JSON responses from VirusTotal, ThreatFox,
  # and URLhaus. Threat indicators in MySQL reference Mongo
  # documents by mongo_ref_id, allowing the AI agent to retrieve
  # full responses on demand without bloating the relational schema.
  # Pinned to 4.4 because of ARM compatibility on Raspberry Pi 5.
  # ------------------------------------------------------------
  # KNOWN ISSUE: MONGODB_USERNAME may not be defined in .env —
  # see file header.
  mongo:
    image: mongo:4.4
    container_name: mongo
    hostname: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGODB_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGODB_PASSWORD}"
      MONGO_INITDB_DATABASE: threat_data_lake
    volumes:
      - mongo_data:/data/db
      - './config/mongo:/docker-entrypoint-initdb.d:ro'
    networks:
      internal_network:
        ipv4_address: 10.10.10.8
    dns: 10.10.10.4
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.DB.MYSQL] MySQL — core relational schema
  # ------------------------------------------------------------
  # Hosts the cyber_intelligence database (DNS queries, threat
  # indicators, AI analysis results, dictionary tables, Grafana
  # views). Schema is initialized by playbook 04.3, partitioning
  # by 04.6.
  #
  # MYSQL_ROOT_HOST=% allows root login from any host on the
  # Docker network — required because the schema script connects
  # via `docker exec` from the Ansible-controlled host process.
  # ------------------------------------------------------------
  mysqldb:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: cyber_intelligence
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql:/docker-entrypoint-initdb.d:ro
    networks:
      internal_network:
        ipv4_address: 10.10.10.9
    dns: 10.10.10.4

  # ------------------------------------------------------------
  # [SVC.UI.PORTAINER] Portainer — Docker management UI
  # ------------------------------------------------------------
  # Web UI for inspecting containers, logs, networks, and volumes.
  # Mounting docker.sock gives Portainer full control over the
  # Docker daemon. Owner account is initialized by playbook 04.4
  # [04.4.3.1] via the REST API.
  # ------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    hostname: portainer
    networks:
      internal_network:
        ipv4_address: 10.10.10.10
    dns: 10.10.10.4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.OBSERVE.GRAFANA] Grafana — dashboards and alerts
  # ------------------------------------------------------------
  # Renders the threat intelligence dashboards backed by
  # cyber_intelligence views (v_grafana_*). Provisioning files
  # (datasources, dashboards) are copied by playbook 04.1
  # [04.1.4.4] and [04.1.4.5].
  # ------------------------------------------------------------
  # KNOWN ISSUE: MYSQL_PASSWORD env var may be unset —
  # see file header.
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      internal_network:
        ipv4_address: 10.10.10.11
    dns: 10.10.10.4
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - './config/grafana/provisioning:/etc/grafana/provisioning'
      - './config/grafana/dashboards:/etc/grafana/dashboards'
      - 'grafana_data:/var/lib/grafana'
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.SECRETS] HashiCorp Vault — secret store
  # ------------------------------------------------------------
  # File-backend Vault used by n8n workflows to fetch CTI API
  # tokens at runtime. Initialized, unsealed, and provisioned by
  # playbook 06. IPC_LOCK capability prevents Vault's secrets
  # from being swapped to disk.
  #
  # Why VAULT_LOCAL_CONFIG inline JSON (not a config file): keeps
  # bootstrap simple — no separate vault.hcl to mount. The actual
  # data lives at /vault/file (mounted from ./config/vault/data,
  # owned by UID 100 — see playbook 04.1 [04.1.5.2]).
  # ------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.21.3
    container_name: hashicorp_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/file"}}, "listener": {"tcp": {"address": "0.0.0.0:8200", "tls_disable": 1}}}'
      VAULT_ADDR: "http://0.0.0.0:8200"
      VAULT_UI: "true"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./config/vault/data:/vault/file
      - ./config/vault/config:/vault/config
    command: server
    networks:
      internal_network:
        ipv4_address: 10.10.10.12
    dns: 10.10.10.4
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.OBSERVE.PROMETHEUS] Prometheus — metrics scraper
  # ------------------------------------------------------------
  # Scrapes node_exporter (system metrics) and any other
  # configured targets (see config/prometheus/prometheus.yml).
  # Used by Grafana as a datasource alongside MySQL.
  # ------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      internal_network:
        ipv4_address: 10.10.10.13
    dns: 10.10.10.4
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.OBSERVE.NODE_EXPORTER] Node Exporter — host metrics
  # ------------------------------------------------------------
  # Exposes host-level metrics (CPU, RAM, disk, network) to
  # Prometheus. Read-only mounts on /proc, /sys, /rootfs let the
  # exporter introspect the host from inside its own container
  # without privileged mode.
  # ------------------------------------------------------------
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      internal_network:
        ipv4_address: 10.10.10.14
    dns: 10.10.10.4
    restart: unless-stopped

  # ------------------------------------------------------------
  # [SVC.SECRETS.UNSEALER] vault_unsealer — auto-unseal helper
  # ------------------------------------------------------------
  # DISABLED — kept commented out for reference. When enabled,
  # this container reads three unseal keys baked into the image
  # at build time and unseals Vault on every restart. Currently
  # unsealing is handled by playbook 06.
  #
  # KNOWN ISSUE: playbook 04.1 [04.1.2.5] and [04.1.2.6] still
  # copy Dockerfile.unsealer and unsealer.py to the remote host
  # even though this service is disabled. Either remove those
  # tasks or re-enable the service below.
  # ------------------------------------------------------------
#  vault_unsealer:
#    build:
#      context: .
#      dockerfile: Dockerfile.unsealer
#      args:
#        - V_KEY1=${VAULT_KEY1}
#        - V_KEY2=${VAULT_KEY2}
#        - V_KEY3=${VAULT_KEY3}
#    container_name: vault_unsealer
#    networks:
#      internal_network:
#        ipv4_address: 10.10.10.15
#    restart: unless-stopped
#    depends_on:
#      - vault

# ============================================================
# Networks
# ============================================================
# Single bridge network for all services. The fixed /24 subnet
# lets us assign predictable IPs (.2 – .15 reserved for stack
# services, .100 reserved for Nginx proxy from playbook 05).
# ============================================================
networks:
  internal_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

# ============================================================
# Volumes
# ============================================================
# Named volumes for stateful services. These persist across
# container recreation; deleting them wipes all data.
#   n8n_data        — workflows, credentials, execution history
#   mysql_data      — cyber_intelligence database files
#   mongo_data      — threat_data_lake database files
#   grafana_data    — dashboards (non-provisioned), users, prefs
#   prometheus_data — TSDB metrics history
# ============================================================
volumes:
  n8n_data:
  mysql_data:
  mongo_data:
  grafana_data:
  prometheus_data: